<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ARC GPX Visualizer</title>
  <meta name="theme-color" content="#0f1115" />

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <link rel="stylesheet" href="./styles/app.css" />
</head>
<body>
  <div class="app">
    <aside id="sidebar">
      <h1>ARC GPX Visualizer</h1>

      <div class="card">
        <h2>Import</h2>
        <div class="row">
          <button id="importBtn">Add GPX files...</button>
          <button id="fitBtn">Fit map</button>
          <button id="clearBtn">Clear library</button>
        </div>
      </div>

      <div class="card">
        <h2>Sources</h2>
        <div id="sourceList"></div>
      </div>

      <div class="card">
        <h2>Activity types</h2>
        <div id="typeFilters"></div>
      </div>

      <div class="card">
        <h2>Display</h2>
        <div class="row">
          <label>line width <input id="optWeight" type="number" min="1" max="10" step="1" value="2"></label>
          <label>opacity <input id="optOpacity" type="number" min="0.1" max="1" step="0.05" value="0.78"></label>
        </div>
        <div class="row" style="margin-top:6px;">
          <label>max pts/seg <input id="optMaxPts" type="number" min="100" step="100" value="4000"></label>
          <label><input id="optOmitSingle" type="checkbox"> omit single-point segs</label>
        </div>
        <div class="row" style="margin-top:6px;">
          <label><input id="toggleWpt" type="checkbox" checked> show waypoints</label>
        </div>
      </div>

      <div class="card">
        <h2>Export</h2>
        <div class="row">
          <button id="exportMergedBtn">Merged .gpx</button>
          <button id="exportPerFileBtn">Per-file round trip</button>
        </div>
        <div class="muted tiny" style="margin-top:6px;">
          Merged emits a single GPX with every track preserved as its own &lt;trk&gt; node.
          Per-file writes one round-tripped file per source to a folder you choose.
        </div>
      </div>

      <div class="card">
        <h2>Status</h2>
        <div id="statusBar"></div>
      </div>
    </aside>
    <main id="map"></main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
